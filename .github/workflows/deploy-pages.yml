name: Deploy frontend to GitHub Pages

# main 브랜치 push 시 프론트엔드를 빌드해 GitHub Pages에 배포한다.
# (백엔드 FastAPI는 Pages에서 실행 불가 — 별도 호스팅 후 VITE_API_BASE 로 연결)
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중이면 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # 저장소 Variables(VITE_API_BASE)에 백엔드 주소 등록 시 주입. 없으면 상대경로.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
